{% extends "base.html" %}
{% block content %}
<div style="max-width: 420px; margin: 60px auto;">
    <div class="card">
        <h2 style="margin-bottom: 20px; text-align: center;">Welcome Back</h2>
        <div id="msg"></div>
        <div id="login-form">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
            <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
            <p style="text-align:center; margin-top:15px; font-size:13px;">
                No account? <a href="#" onclick="showSignup()">Sign up</a>
            </p>
        </div>
        <div id="signup-form" style="display:none">
            <label>Name</label>
            <input type="text" id="s-name" placeholder="Your name">
            <label>Email</label>
            <input type="email" id="s-email" placeholder="you@example.com">
            <label>Password</label>
            <input type="password" id="s-password" placeholder="••••••••">
            <button class="btn btn-primary" style="width:100%" onclick="signup()">Sign Up</button>
            <p style="text-align:center; margin-top:15px; font-size:13px;">
                Have account? <a href="#" onclick="showLogin()">Login</a>
            </p>
        </div>
    </div>
</div>
<script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard';

    function showMsg(text, type) {
        document.getElementById('msg').innerHTML = `<div class="alert alert-${type}">${text}</div>`;
    }
    function showSignup() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('signup-form').style.display = 'block';
    }
    function showLogin() {
        document.getElementById('signup-form').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
    }
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/dashboard';
        } else {
            showMsg(data.detail, 'error');
        }
    }
    async function signup() {
        const name = document.getElementById('s-name').value;
        const email = document.getElementById('s-email').value;
        const password = document.getElementById('s-password').value;
        const res = await fetch('/signup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, email, password})
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/dashboard';
        } else {
            showMsg(data.detail, 'error');
        }
    }
</script>
{% endblock %}
