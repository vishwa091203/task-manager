<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-shell">
        <nav class="top-nav">
            <a class="brand" href="/dashboard" aria-label="Task Manager dashboard">
                <span class="brand-mark">TM</span>
                <span>Task Manager</span>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/projects-page">Projects</a>
                <a href="/tasks-page">Tasks</a>
                <button class="icon-button" type="button" onclick="logout()" title="Logout" aria-label="Logout">
                    <span aria-hidden="true">Logout</span>
                </button>
            </div>
        </nav>

        <main class="container">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        function getToken() {
            return localStorage.getItem('token');
        }

        function getUser() {
            return JSON.parse(localStorage.getItem('user') || '{}');
        }

        function requireAuth() {
            if (!getToken() && window.location.pathname !== '/') {
                window.location.href = '/';
            }
        }

        function showElement(id) {
            const element = document.getElementById(id);
            if (element) element.classList.remove('is-hidden');
        }

        function hideElement(id) {
            const element = document.getElementById(id);
            if (element) element.classList.add('is-hidden');
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, function(match) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                }[match];
            });
        }

        if (window.location.pathname === '/') {
            const nav = document.getElementById('nav-links');
            if (nav) nav.style.display = 'none';
        } else {
            requireAuth();
        }
    </script>
</body>
</html>
