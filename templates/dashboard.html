{% extends "base.html" %}
{% block content %}
<section class="page-heading">
    <div>
        <p class="eyebrow">Workspace overview</p>
        <h1>Dashboard</h1>
    </div>
    <a class="btn btn-secondary" href="/tasks-page">Open tasks</a>
</section>

<section class="stat-grid">
    <article class="glass-card stat-card">
        <p>Total tasks</p>
        <h2 id="total">0</h2>
    </article>
    <article class="glass-card stat-card">
        <p>To do</p>
        <h2 id="todo">0</h2>
    </article>
    <article class="glass-card stat-card">
        <p>In progress</p>
        <h2 id="progress">0</h2>
    </article>
    <article class="glass-card stat-card">
        <p>Done</p>
        <h2 id="done">0</h2>
    </article>
</section>

<section class="glass-card panel">
    <div class="panel-title">
        <div>
            <p class="eyebrow">Current session</p>
            <h2>Overview</h2>
        </div>
        <span id="overdue" class="badge badge-overdue">0 overdue</span>
    </div>
    <div class="detail-grid">
        <div>
            <span>Logged in as</span>
            <strong id="username">-</strong>
        </div>
        <div>
            <span>Your role</span>
            <strong id="role">-</strong>
        </div>
        <div>
            <span>Completion</span>
            <strong id="completion">0%</strong>
        </div>
    </div>
</section>

<script>
async function loadDashboard() {
    const res = await fetch('/dashboard/', {headers: {'Authorization': 'Bearer ' + getToken()}});
    if (!res.ok) { logout(); return; }
    const data = await res.json();
    const completion = data.total_tasks ? Math.round((data.done / data.total_tasks) * 100) : 0;
    document.getElementById('total').textContent = data.total_tasks;
    document.getElementById('todo').textContent = data.todo;
    document.getElementById('progress').textContent = data.in_progress;
    document.getElementById('done').textContent = data.done;
    document.getElementById('overdue').textContent = data.overdue + ' overdue';
    document.getElementById('role').textContent = data.role;
    document.getElementById('username').textContent = data.user;
    document.getElementById('completion').textContent = completion + '%';
}
loadDashboard();
</script>
{% endblock %}
