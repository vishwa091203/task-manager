{% extends "base.html" %}
{% block content %}
<section class="page-heading">
    <div>
        <p class="eyebrow">Project library</p>
        <h1>Projects</h1>
    </div>
    <button class="btn btn-primary" type="button" onclick="showElement('create-form')">New project</button>
</section>

<section class="glass-card panel is-hidden" id="create-form">
    <div class="panel-title">
        <div>
            <p class="eyebrow">Create</p>
            <h2>New project</h2>
        </div>
        <button class="ghost-button" type="button" onclick="hideElement('create-form')">Close</button>
    </div>
    <div class="form-grid">
        <div>
            <label for="p-name">Project name</label>
            <input type="text" id="p-name" placeholder="Launch plan">
        </div>
        <div>
            <label for="p-desc">Description</label>
            <textarea id="p-desc" rows="3" placeholder="What this project is about"></textarea>
        </div>
    </div>
    <button class="btn btn-primary" type="button" onclick="createProject()">Create project</button>
</section>

<section class="glass-card panel">
    <div class="table-wrap">
        <table>
            <thead><tr><th>Name</th><th>Description</th><th>Action</th></tr></thead>
            <tbody id="projects-list"><tr><td colspan="3">Loading...</td></tr></tbody>
        </table>
    </div>
</section>

<script>
async function loadProjects() {
    const res = await fetch('/projects/', {headers: {'Authorization': 'Bearer ' + getToken()}});
    if (!res.ok) { logout(); return; }
    const data = await res.json();
    const tbody = document.getElementById('projects-list');
    if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state">No projects yet</div></td></tr>';
        return;
    }
    tbody.innerHTML = data.map(function(p) {
        return '<tr><td><strong>' + escapeHtml(p.name) + '</strong></td><td>' + escapeHtml(p.description || '-') + '</td><td><a class="table-link" href="/tasks-page?project=' + p.id + '">View tasks</a></td></tr>';
    }).join('');
}

async function createProject() {
    const name = document.getElementById('p-name').value.trim();
    const description = document.getElementById('p-desc').value.trim();
    const res = await fetch('/projects/', {
        method: 'POST',
        headers: {'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json'},
        body: JSON.stringify({name, description})
    });
    if (res.ok) {
        document.getElementById('p-name').value = '';
        document.getElementById('p-desc').value = '';
        hideElement('create-form');
        loadProjects();
    } else {
        const d = await res.json();
        alert(d.detail || 'Unable to create project.');
    }
}
loadProjects();
</script>
{% endblock %}
