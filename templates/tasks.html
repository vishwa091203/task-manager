{% extends "base.html" %}
{% block content %}
<section class="page-heading">
    <div>
        <p class="eyebrow">Task board</p>
        <h1>Tasks</h1>
    </div>
    <button class="btn btn-primary" type="button" onclick="showElement('create-form')">New task</button>
</section>

<section class="glass-card panel is-hidden" id="create-form">
    <div class="panel-title">
        <div>
            <p class="eyebrow">Create</p>
            <h2>New task</h2>
        </div>
        <button class="ghost-button" type="button" onclick="hideElement('create-form')">Close</button>
    </div>
    <div class="form-grid two-column">
        <div>
            <label for="t-title">Title</label>
            <input type="text" id="t-title" placeholder="Prepare project brief">
        </div>
        <div>
            <label for="t-project">Project</label>
            <select id="t-project"></select>
        </div>
        <div>
            <label for="t-due">Due date</label>
            <input type="datetime-local" id="t-due">
        </div>
        <div>
            <label for="t-desc">Description</label>
            <textarea id="t-desc" rows="3" placeholder="Add useful details"></textarea>
        </div>
    </div>
    <button class="btn btn-primary" type="button" onclick="createTask()">Create task</button>
</section>

<section class="glass-card panel">
    <div class="table-wrap">
        <table>
            <thead><tr><th>Task</th><th>Project</th><th>Assignee</th><th>Status</th><th>Due</th><th>Update</th></tr></thead>
            <tbody id="tasks-list"><tr><td colspan="6">Loading...</td></tr></tbody>
        </table>
    </div>
</section>

<script>
async function loadData() {
    const token = getToken();
    const headers = {'Authorization': 'Bearer ' + token};
    const projectsRes = await fetch('/projects/', {headers});
    const tasksRes = await fetch('/tasks/', {headers});
    if (!projectsRes.ok || !tasksRes.ok) { logout(); return; }
    const projects = await projectsRes.json();
    const tasks = await tasksRes.json();
    const projectMap = Object.fromEntries(projects.map(function(p) { return [p.id, p.name]; }));
    document.getElementById('t-project').innerHTML = projects.map(function(p){
        return '<option value="' + p.id + '">' + escapeHtml(p.name) + '</option>';
    }).join('');

    const tbody = document.getElementById('tasks-list');
    if (!tasks.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No tasks yet</div></td></tr>';
        return;
    }

    tbody.innerHTML = tasks.map(function(t) {
        const badge = t.status === 'todo' ? 'badge-todo' : t.status === 'in_progress' ? 'badge-progress' : 'badge-done';
        const label = t.status === 'in_progress' ? 'In progress' : t.status === 'todo' ? 'To do' : 'Done';
        const due = t.due_date ? new Date(t.due_date).toLocaleDateString() : '-';
        return '<tr><td><strong>' + escapeHtml(t.title) + '</strong><small>' + escapeHtml(t.description || '') + '</small></td><td>' + escapeHtml(projectMap[t.project_id] || t.project_id) + '</td><td>' + (t.assignee_id || 'Unassigned') + '</td><td><span class="badge ' + badge + '">' + label + '</span></td><td>' + due + '</td><td><select class="status-select" onchange="updateStatus(' + t.id + ', this.value)"><option value="todo"' + (t.status === 'todo' ? ' selected' : '') + '>To do</option><option value="in_progress"' + (t.status === 'in_progress' ? ' selected' : '') + '>In progress</option><option value="done"' + (t.status === 'done' ? ' selected' : '') + '>Done</option></select></td></tr>';
    }).join('');
}

async function createTask() {
    const projectId = parseInt(document.getElementById('t-project').value);
    if (!projectId) {
        alert('Create a project before adding tasks.');
        return;
    }
    const body = {
        title: document.getElementById('t-title').value.trim(),
        description: document.getElementById('t-desc').value.trim(),
        project_id: projectId,
        due_date: document.getElementById('t-due').value || null
    };
    const res = await fetch('/tasks/', {
        method: 'POST',
        headers: {'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });
    if (res.ok) {
        document.getElementById('t-title').value = '';
        document.getElementById('t-desc').value = '';
        document.getElementById('t-due').value = '';
        hideElement('create-form');
        loadData();
    } else {
        const d = await res.json();
        alert(d.detail || 'Unable to create task.');
    }
}

async function updateStatus(taskId, status) {
    const res = await fetch('/tasks/' + taskId, {
        method: 'PATCH',
        headers: {'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json'},
        body: JSON.stringify({status: status})
    });
    if (!res.ok) {
        const d = await res.json();
        alert(d.detail || 'Unable to update task.');
    }
    loadData();
}
loadData();
</script>
{% endblock %}
